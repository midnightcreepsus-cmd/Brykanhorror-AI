name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Buildozer dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ccache libncurses5:i386 libstdc++6:i386 libgtk2.0-0:i386 libpangox-1.0-0:i386 libpangoxft-1.0-0:i386 libidn11:i386 python3-pip python3-setuptools openjdk-17-jdk unzip ZIP
        pip3 install --upgrade pip
        pip3 install buildozer cython Kivy

    - name: Build with Buildozer
      run: |
        yes | buildozer android debug
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Brykanhorror-AI-APK
        path: bin/*.apk
